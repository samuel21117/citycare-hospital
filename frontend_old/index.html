<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Appointment & E-Prescription System</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .landing-hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }
        .hero-content {
            flex: 1;
            padding-right: 40px;
        }
        .hero-title {
            font-size: 3.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            line-height: 1.2;
        }
        .auth-container {
            width: 400px;
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .auth-tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        #alertBox {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            font-size: 0.9rem;
        }
        .alert-error { background: #fee2e2; color: #991b1b; }
        .alert-success { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<div class="landing-hero">
    <div class="container" style="display: flex; align-items: center;">
        <div class="hero-content">
            <h1 class="hero-title">Modern Healthcare at Your Fingertips</h1>
            <p style="font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 30px;">
                Seamlessly book appointments, access electronic prescriptions, and manage pharmacy orders all in one integrated platform.
            </p>
        </div>
        
        <div class="auth-container">
            <div class="glass-card">
                <div class="auth-tabs">
                    <div class="auth-tab active" onclick="switchTab('login')">Log In</div>
                    <div class="auth-tab" onclick="switchTab('register')">Register</div>
                </div>

                <div id="alertBox"></div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="loginEmail" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="loginPassword" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="regName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="regEmail" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="regPassword" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Register As</label>
                        <select id="regRole" class="form-control">
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                            <option value="pharmacy">Pharmacy Staff</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Chatbot Widget -->
<div class="chatbot-widget" id="chatbotWidget">
    <div class="chatbot-window" id="chatbotWindow">
        <div class="chatbot-header">Health Assistant</div>
        <div class="chatbot-messages" id="chatbotMessages">
            <div style="background:#f1f5f9; padding:10px; border-radius:8px; align-self:flex-start; max-width:80%;">
                Hello! How can I help you today? You can ask about booking an appointment, or mention a symptom.
            </div>
        </div>
        <div class="chatbot-input-area">
            <input type="text" id="chatbotInput" placeholder="Type a message..." autocomplete="off">
            <button onclick="sendMessage()" class="btn btn-primary" style="padding: 8px 12px;">Send</button>
        </div>
    </div>
    <div class="chatbot-toggle" onclick="toggleChatbot()">
        💬
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/chatbot.js"></script>
<script>
    function switchTab(tab) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        
        if(tab === 'login') {
            document.querySelectorAll('.auth-tab')[0].classList.add('active');
            document.getElementById('loginForm').classList.add('active');
        } else {
            document.querySelectorAll('.auth-tab')[1].classList.add('active');
            document.getElementById('registerForm').classList.add('active');
        }
        document.getElementById('alertBox').style.display = 'none';
    }
</script>
</body>
</html>
